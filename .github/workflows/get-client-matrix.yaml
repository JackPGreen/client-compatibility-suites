name: Get client matrix

on:
  workflow_call:
    inputs:
      client:
        type: string
        required: true

jobs:
  setup_server_matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout to scripts
        uses: actions/checkout@v6
      - name: Set client matrix
        id: set-matrix
        run: |
          echo "matrix=$(
            python \
            get_client_matrix.py \
              --client "${INPUT_CLIENT}" \
              --option tag \
              --use-latest-patch-versions
          )" >> "${GITHUB_OUTPUT}"
